version: "3.8"

services:
  mt5-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: essamamdani/xm-exness-mt5-linux:latest
    container_name: xm-exness-mt5-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - API_PORT=${API_PORT:-8000}
      - API_HOST=0.0.0.0
      - API_TOKEN=${API_TOKEN:?API_TOKEN is required in .env}
      - VNC_ENABLED=${VNC_ENABLED:-true}
      - VNC_PASSWORD=${VNC_PASSWORD:-password}
      - SCREEN_RESOLUTION=${SCREEN_RESOLUTION:-1024x768}
      - DATA_DIR=/data
    ports:
      # REST API is always exposed
      - "${API_PORT:-8000}:${API_PORT:-8000}"
      # VNC/noVNC: enable by adding docker-compose.vnc.yml or uncomment below
      # - "${VNC_PORT:-5901}:5901"
      # - "${NOVNC_PORT:-6901}:6901"
    volumes:
      - mt5_data:/data
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    stdin_open: true
    tty: true

volumes:
  mt5_data:
